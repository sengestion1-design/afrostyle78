name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp mirror)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          lftp -u "$SFTP_USER,$SFTP_PASS" "sftp://$SFTP_HOST" <<'EOF'
          set sftp:auto-confirm yes
          set net:reconnect-interval-base 5
          set net:max-retries 2
          set net:timeout 30
          lcd .
          mirror --reverse --verbose --parallel=2 \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob vendor/.git/ \
            --exclude-glob 'assets/MARKETING*' \
            --exclude-glob 'assets/Facture-*.pdf' \
            --exclude deploy.sh \
            --exclude install.php \
            --exclude afrostyle.sql \
            --exclude monetbil-payment-notification-fr.pdf \
            --exclude-glob config/database.php \
            --exclude-glob config/mailer.php \
            --exclude-glob config/secrets.php \
            . /
          bye
          EOF
